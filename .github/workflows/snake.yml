name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: naydourado
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff1493&color_dots=#ffe4f2,#ffb6d9,#ff69b4,#ff1493,#c71585
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff1493&color_dots=#3a0a1f,#6a0f3b,#a3125a,#ff1493,#ff69b4

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
